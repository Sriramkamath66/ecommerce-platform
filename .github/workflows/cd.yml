name: CD — Build, Push & Deploy

on:
  push:
    branches:
      - main
    paths:
      - "services/**"
      - "infrastructure/**"
      - ".github/workflows/cd.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  HELM_VERSION: "3.17.3"
  KUBECTL_VERSION: "1.31.0"
  NAMESPACE: ai-ecommerce
  AWS_REGION: us-west-2
  EKS_CLUSTER_NAME: lowerint

jobs:
  build-and-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - user-service
          - product-service
          - cart-service
          - order-service
          - inventory-service
          - payment-service
          - notification-service
          - recommendation-service
          - ai-assistant-service

    outputs:
      image-digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image owner
        id: owner
        # ghcr.io requires the entire image reference to be lowercase.
        # github.repository_owner may contain uppercase letters (e.g. Sriramkamath66).
        run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ matrix.service }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          provenance: true
          sbom: true
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ github.sha }}

      - name: Output image digest
        run: echo "Image digest ${{ steps.push.outputs.digest }} pushed for ${{ matrix.service }}"

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ secrets.AWS_ACCESS_KEY_ID != '' }}
    permissions:
      contents: read
      packages: read
    environment:
      name: production
      url: https://app.ai-ecommerce.example.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image owner
        id: owner
        run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Install Helm
        run: |
          curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
          chmod 700 get_helm.sh
          DESIRED_VERSION=v${{ env.HELM_VERSION }} ./get_helm.sh

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/v${{ env.KUBECTL_VERSION }}/bin/linux/amd64/kubectl"
          sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
          kubectl version --client

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Verify namespace exists
        run: |
          kubectl get namespace ${{ env.NAMESPACE }} || \
          kubectl create namespace ${{ env.NAMESPACE }}

      - name: Update Helm chart dependencies
        run: |
          helm dependency update ./infrastructure/helm/ai-ecommerce

      - name: Helm upgrade/install
        run: |
          helm upgrade --install ai-ecommerce \
            ./infrastructure/helm/ai-ecommerce \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --values ./infrastructure/helm/ai-ecommerce/values.yaml \
            --set global.image.tag=${{ github.sha }} \
            --set global.image.registry=${{ env.REGISTRY }} \
            --set services.userService.image.repository=${{ steps.owner.outputs.value }}/user-service \
            --set services.productService.image.repository=${{ steps.owner.outputs.value }}/product-service \
            --set services.cartService.image.repository=${{ steps.owner.outputs.value }}/cart-service \
            --set services.orderService.image.repository=${{ steps.owner.outputs.value }}/order-service \
            --set services.inventoryService.image.repository=${{ steps.owner.outputs.value }}/inventory-service \
            --set services.paymentService.image.repository=${{ steps.owner.outputs.value }}/payment-service \
            --set services.notificationService.image.repository=${{ steps.owner.outputs.value }}/notification-service \
            --set services.recommendationService.image.repository=${{ steps.owner.outputs.value }}/recommendation-service \
            --set services.aiAssistantService.image.repository=${{ steps.owner.outputs.value }}/ai-assistant-service \
            --set secrets.postgresPassword=${{ secrets.POSTGRES_PASSWORD }} \
            --set secrets.anthropicApiKey=${{ secrets.ANTHROPIC_API_KEY }} \
            --set secrets.voyageApiKey=${{ secrets.VOYAGE_API_KEY }} \
            --set secrets.jwtPrivateKey=${{ secrets.JWT_PRIVATE_KEY }} \
            --set secrets.jwtPublicKey=${{ secrets.JWT_PUBLIC_KEY }} \
            --set secrets.stripeSecretKey=${{ secrets.STRIPE_SECRET_KEY }} \
            --set secrets.smtpUsername=${{ secrets.SMTP_USERNAME }} \
            --set secrets.smtpPassword=${{ secrets.SMTP_PASSWORD }} \
            --wait \
            --timeout 10m \
            --atomic \
            --history-max 5

      - name: Verify rollout
        run: |
          for svc in user-service product-service cart-service order-service \
                     inventory-service payment-service notification-service \
                     recommendation-service ai-assistant-service; do
            echo "Checking rollout for $svc..."
            kubectl rollout status deployment/$svc \
              --namespace ${{ env.NAMESPACE }} \
              --timeout=5m
          done

  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ secrets.AWS_ACCESS_KEY_ID != '' }}
    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/v${{ env.KUBECTL_VERSION }}/bin/linux/amd64/kubectl"
          sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
          kubectl version --client

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Port-forward Kong gateway
        run: |
          kubectl port-forward svc/kong-proxy 8000:8000 \
            --namespace ${{ env.NAMESPACE }} &
          sleep 5

      - name: Run health checks via Kong
        run: |
          set -e
          GATEWAY="http://localhost:8000"
          FAILED=0

          check_health() {
            local service=$1
            local path=$2
            local response
            response=$(curl --silent --output /dev/null --write-out "%{http_code}" \
              --max-time 10 \
              --retry 3 \
              --retry-delay 2 \
              "$GATEWAY$path")
            if [[ "$response" == "200" ]]; then
              echo "PASS: $service health check ($response)"
            else
              echo "FAIL: $service health check returned HTTP $response"
              FAILED=1
            fi
          }

          check_health "user-service"           "/api/v1/users/health"
          check_health "product-service"        "/api/v1/products/health"
          check_health "cart-service"           "/api/v1/cart/health"
          check_health "order-service"          "/api/v1/orders/health"
          check_health "inventory-service"      "/api/v1/inventory/health"
          check_health "payment-service"        "/api/v1/payments/health"
          check_health "notification-service"   "/api/v1/notifications/health"
          check_health "recommendation-service" "/api/v1/recommendations/health"
          check_health "ai-assistant-service"   "/api/v1/assistant/health"

          if [[ "$FAILED" -ne 0 ]]; then
            echo "One or more smoke tests failed."
            exit 1
          fi

          echo "All smoke tests passed."

      - name: Check public product endpoint
        run: |
          response=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            --max-time 10 \
            "http://localhost:8000/api/v1/products")
          if [[ "$response" != "200" ]]; then
            echo "FAIL: Public product listing returned HTTP $response"
            exit 1
          fi
          echo "PASS: Public product listing is accessible without auth."

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Smoke tests failed after deployment of ${{ github.sha }}. Manual intervention may be required."
