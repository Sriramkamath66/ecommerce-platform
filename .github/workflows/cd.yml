name: CD — Build, Push & Deploy

on:
  push:
    branches:
      - main
    paths:
      - "services/**"
      - "infrastructure/**"
      - ".github/workflows/cd.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  HELM_VERSION: "3.17.3"
  KUBECTL_VERSION: "1.31.0"
  NAMESPACE: ai-ecommerce

jobs:
  build-and-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - user-service
          - product-service
          - cart-service
          - order-service
          - inventory-service
          - payment-service
          - notification-service
          - recommendation-service
          - ai-assistant-service

    outputs:
      image-digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image owner
        id: owner
        # ghcr.io requires the entire image reference to be lowercase.
        # github.repository_owner may contain uppercase letters (e.g. Sriramkamath66).
        run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ matrix.service }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          provenance: true
          sbom: true
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ github.sha }}

      - name: Output image digest
        run: echo "Image digest ${{ steps.push.outputs.digest }} pushed for ${{ matrix.service }}"

  # ── Helm validation on a temporary Kind cluster ───────────────────────────────
  # Runs on every push to main — no secrets required, no cloud account needed.
  # Validates: chart renders correctly, backing services (postgres + redis) start.
  validate-kind:
    name: Validate Helm Chart (Kind)
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Kind cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: ci-ecommerce
          wait: 120s

      - name: Install Helm
        run: |
          curl -fsSL -o get_helm.sh \
            https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
          chmod 700 get_helm.sh
          DESIRED_VERSION=v${{ env.HELM_VERSION }} ./get_helm.sh

      - name: Add Bitnami repo and update chart dependencies
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update
          helm dependency update ./infrastructure/helm/ai-ecommerce

      - name: Helm lint
        run: |
          helm lint ./infrastructure/helm/ai-ecommerce \
            --values ./infrastructure/helm/ai-ecommerce/values.yaml

      - name: Helm dry-run (full template render)
        run: |
          helm upgrade --install ai-ecommerce \
            ./infrastructure/helm/ai-ecommerce \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --dry-run \
            --values ./infrastructure/helm/ai-ecommerce/values.yaml \
            --set global.image.tag=${{ github.sha }} \
            --set secrets.postgresPassword=ci-test \
            --set secrets.anthropicApiKey=sk-placeholder \
            --set secrets.voyageApiKey=pa-placeholder \
            --set secrets.jwtPrivateKey=placeholder \
            --set secrets.jwtPublicKey=placeholder

      - name: Install backing services only (postgres + redis)
        # Disable all 9 app services — they need real API keys.
        # This verifies the Helm chart deploys and postgres/redis start correctly.
        run: |
          helm upgrade --install ai-ecommerce \
            ./infrastructure/helm/ai-ecommerce \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --values ./infrastructure/helm/ai-ecommerce/values.yaml \
            --set global.image.tag=${{ github.sha }} \
            --set secrets.postgresPassword=ci-test \
            --set secrets.anthropicApiKey=sk-placeholder \
            --set secrets.voyageApiKey=pa-placeholder \
            --set secrets.jwtPrivateKey=placeholder \
            --set secrets.jwtPublicKey=placeholder \
            --set services.userService.replicaCount=0 \
            --set services.productService.replicaCount=0 \
            --set services.cartService.replicaCount=0 \
            --set services.orderService.replicaCount=0 \
            --set services.inventoryService.replicaCount=0 \
            --set services.paymentService.replicaCount=0 \
            --set services.notificationService.replicaCount=0 \
            --set services.recommendationService.replicaCount=0 \
            --set services.aiAssistantService.replicaCount=0 \
            --wait \
            --timeout 5m

      - name: Verify PostgreSQL is ready
        run: |
          kubectl wait --for=condition=ready pod \
            -l app.kubernetes.io/name=postgresql \
            -n ${{ env.NAMESPACE }} \
            --timeout=120s
          echo "PASS: PostgreSQL is ready"

      - name: Verify Redis is ready
        run: |
          kubectl wait --for=condition=ready pod \
            -l app.kubernetes.io/name=redis \
            -n ${{ env.NAMESPACE }} \
            --timeout=120s
          echo "PASS: Redis is ready"

      - name: Show cluster state on failure
        if: failure()
        run: |
          kubectl get all -n ${{ env.NAMESPACE }}
          kubectl describe pods -n ${{ env.NAMESPACE }}

  # ── Production deploy — provider-agnostic, gated on KUBE_CONFIG secret ────────
  # Set KUBE_CONFIG in GitHub repo Secrets (base64-encoded kubeconfig) to enable.
  # Works with any Kubernetes cluster: GKE, AKS, DOKS, k3s, local — not AWS-specific.
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: validate-kind
    if: ${{ secrets.KUBE_CONFIG != '' }}
    permissions:
      contents: read
      packages: read
    environment:
      name: production
      url: https://app.ai-ecommerce.example.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image owner
        id: owner
        run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Install Helm
        run: |
          curl -fsSL -o get_helm.sh \
            https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
          chmod 700 get_helm.sh
          DESIRED_VERSION=v${{ env.HELM_VERSION }} ./get_helm.sh

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/v${{ env.KUBECTL_VERSION }}/bin/linux/amd64/kubectl"
          sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Add Bitnami repo and update chart dependencies
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update
          helm dependency update ./infrastructure/helm/ai-ecommerce

      - name: Helm upgrade/install
        run: |
          helm upgrade --install ai-ecommerce \
            ./infrastructure/helm/ai-ecommerce \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --values ./infrastructure/helm/ai-ecommerce/values.yaml \
            --set global.image.tag=${{ github.sha }} \
            --set global.image.registry=${{ env.REGISTRY }} \
            --set services.userService.image.repository=${{ steps.owner.outputs.value }}/user-service \
            --set services.productService.image.repository=${{ steps.owner.outputs.value }}/product-service \
            --set services.cartService.image.repository=${{ steps.owner.outputs.value }}/cart-service \
            --set services.orderService.image.repository=${{ steps.owner.outputs.value }}/order-service \
            --set services.inventoryService.image.repository=${{ steps.owner.outputs.value }}/inventory-service \
            --set services.paymentService.image.repository=${{ steps.owner.outputs.value }}/payment-service \
            --set services.notificationService.image.repository=${{ steps.owner.outputs.value }}/notification-service \
            --set services.recommendationService.image.repository=${{ steps.owner.outputs.value }}/recommendation-service \
            --set services.aiAssistantService.image.repository=${{ steps.owner.outputs.value }}/ai-assistant-service \
            --set secrets.postgresPassword=${{ secrets.POSTGRES_PASSWORD }} \
            --set secrets.anthropicApiKey=${{ secrets.ANTHROPIC_API_KEY }} \
            --set secrets.voyageApiKey=${{ secrets.VOYAGE_API_KEY }} \
            --set secrets.jwtPrivateKey=${{ secrets.JWT_PRIVATE_KEY }} \
            --set secrets.jwtPublicKey=${{ secrets.JWT_PUBLIC_KEY }} \
            --set secrets.smtpUsername=${{ secrets.SMTP_USERNAME }} \
            --set secrets.smtpPassword=${{ secrets.SMTP_PASSWORD }} \
            --wait \
            --timeout 10m \
            --atomic \
            --history-max 5

      - name: Verify rollout
        run: |
          for svc in user-service product-service cart-service order-service \
                     inventory-service payment-service notification-service \
                     recommendation-service ai-assistant-service; do
            kubectl rollout status deployment/$svc \
              --namespace ${{ env.NAMESPACE }} --timeout=5m
          done

  # ── Smoke tests — run after production deploy ─────────────────────────────────
  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-production
    if: ${{ secrets.KUBE_CONFIG != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/v${{ env.KUBECTL_VERSION }}/bin/linux/amd64/kubectl"
          sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Port-forward Kong gateway
        run: |
          kubectl port-forward svc/kong-proxy 8000:8000 \
            --namespace ${{ env.NAMESPACE }} &
          sleep 8

      - name: Run health checks via Kong
        run: |
          set -e
          GATEWAY="http://localhost:8000"
          FAILED=0

          check_health() {
            local service=$1
            local path=$2
            local response
            response=$(curl --silent --output /dev/null --write-out "%{http_code}" \
              --max-time 10 --retry 3 --retry-delay 3 "$GATEWAY$path")
            if [[ "$response" == "200" ]]; then
              echo "PASS: $service ($response)"
            else
              echo "FAIL: $service returned HTTP $response"
              FAILED=1
            fi
          }

          check_health "user-service"           "/api/v1/users/health"
          check_health "product-service"        "/api/v1/products/health"
          check_health "cart-service"           "/api/v1/cart/health"
          check_health "order-service"          "/api/v1/orders/health"
          check_health "inventory-service"      "/api/v1/inventory/health"
          check_health "payment-service"        "/api/v1/payments/health"
          check_health "notification-service"   "/api/v1/notifications/health"
          check_health "recommendation-service" "/api/v1/recommendations/health"
          check_health "ai-assistant-service"   "/api/v1/assistant/health"

          [[ "$FAILED" -eq 0 ]] || { echo "One or more smoke tests failed."; exit 1; }
          echo "All smoke tests passed."

      - name: Notify on failure
        if: failure()
        run: echo "::error::Smoke tests failed after deployment of ${{ github.sha }}."
