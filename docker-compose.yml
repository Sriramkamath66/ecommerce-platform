version: "3.9"

x-service-defaults: &service-defaults
  restart: unless-stopped
  env_file: .env
  networks:
    - ecommerce

x-fastapi-defaults: &fastapi-defaults
  <<: *service-defaults
  volumes:
    - ./shared:/app/shared:ro
    - ./keys:/app/keys:ro
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  # ── Backing services ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    <<: *service-defaults
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/init-dbs.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    <<: *service-defaults
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    <<: *service-defaults
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"

  mailhog:
    image: mailhog/mailhog:latest
    <<: *service-defaults
    ports:
      - "1025:1025"
      - "8025:8025"

  # ── Kong API Gateway ──────────────────────────────────────────────────────────

  kong:
    image: kong:3.6-ubuntu
    <<: *service-defaults
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8444"
    volumes:
      - ./infrastructure/kong/kong.yml:/kong/kong.yml:ro
    ports:
      - "8000:8000"
      - "8444:8444"
    depends_on:
      - user-service
      - product-service
      - cart-service
      - order-service
      - inventory-service
      - payment-service
      - notification-service
      - recommendation-service
      - ai-assistant-service

  # ── Microservices ──────────────────────────────────────────────────────────────

  user-service:
    <<: *fastapi-defaults
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${USERS_DB:-users_db}
      SERVICE_PORT: "8001"

  product-service:
    <<: *fastapi-defaults
    build:
      context: ./services/product-service
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${PRODUCTS_DB:-products_db}
      SERVICE_PORT: "8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  cart-service:
    <<: *service-defaults
    build:
      context: ./services/cart-service
      dockerfile: Dockerfile
    volumes:
      - ./shared:/app/shared:ro
      - ./keys:/app/keys:ro
    ports:
      - "8003:8003"
    environment:
      SERVICE_PORT: "8003"
    depends_on:
      redis:
        condition: service_healthy

  order-service:
    <<: *fastapi-defaults
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${ORDERS_DB:-orders_db}
      SERVICE_PORT: "8004"

  inventory-service:
    <<: *fastapi-defaults
    build:
      context: ./services/inventory-service
      dockerfile: Dockerfile
    ports:
      - "8005:8005"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${INVENTORY_DB:-inventory_db}
      SERVICE_PORT: "8005"

  payment-service:
    <<: *fastapi-defaults
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    ports:
      - "8006:8006"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${PAYMENTS_DB:-payments_db}
      SERVICE_PORT: "8006"

  notification-service:
    <<: *fastapi-defaults
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    ports:
      - "8007:8007"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${NOTIFICATIONS_DB:-notifications_db}
      SERVICE_PORT: "8007"

  recommendation-service:
    <<: *service-defaults
    build:
      context: ./services/recommendation-service
      dockerfile: Dockerfile
    volumes:
      - ./shared:/app/shared:ro
      - ./keys:/app/keys:ro
    ports:
      - "8008:8008"
    environment:
      SERVICE_PORT: "8008"
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  ai-assistant-service:
    <<: *service-defaults
    build:
      context: ./services/ai-assistant-service
      dockerfile: Dockerfile
    volumes:
      - ./shared:/app/shared:ro
      - ./keys:/app/keys:ro
    ports:
      - "8009:8009"
    environment:
      SERVICE_PORT: "8009"
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  # ── Monitoring ────────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    <<: *service-defaults
    volumes:
      - ./infrastructure/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"

  grafana:
    image: grafana/grafana:latest
    <<: *service-defaults
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infrastructure/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  prometheus_data:
  grafana_data:

networks:
  ecommerce:
    driver: bridge
