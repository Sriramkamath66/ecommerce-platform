apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "ai-ecommerce.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | b64enc | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | b64enc | quote }}
  VOYAGE_API_KEY: {{ .Values.secrets.voyageApiKey | b64enc | quote }}
  JWT_PRIVATE_KEY: {{ .Values.secrets.jwtPrivateKey | b64enc | quote }}
  JWT_PUBLIC_KEY: {{ .Values.secrets.jwtPublicKey | b64enc | quote }}
  STRIPE_SECRET_KEY: {{ .Values.secrets.stripeSecretKey | b64enc | quote }}
  SMTP_USERNAME: {{ .Values.secrets.smtpUsername | b64enc | quote }}
  SMTP_PASSWORD: {{ .Values.secrets.smtpPassword | b64enc | quote }}
