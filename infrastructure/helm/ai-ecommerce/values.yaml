global:
  image:
    registry: ghcr.io
    pullPolicy: IfNotPresent
    tag: latest
  namespace: ai-ecommerce
  imagePullSecrets: []

services:
  userService:
    enabled: true
    replicaCount: 2
    image:
      repository: REPO/user-service
      tag: ""
    port: 8001
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70

  productService:
    enabled: true
    replicaCount: 2
    image:
      repository: REPO/product-service
      tag: ""
    port: 8002
    resources:
