plugins:
  - name: rate-limiting
    config:
      minute: 1000
      limit_by: ip
      policy: local
      hide_client_headers: false
      fault_tolerant: true

  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - Authorization
        - X-Auth-Token
        - X-Request-ID
      exposed_headers:
        - X-Auth-Token
        - X-Request-ID
      credentials: true
      max_age: 3600
      preflight_continue: false

  - name: request-id
    config:
      header_name: X-Request-ID
      generator: uuid#counter
      echo_downstream: true
