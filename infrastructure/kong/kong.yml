_format_version: "3.0"
_transform: true

services:
  - name: user-service
    url: http://user-service:8001
    connect_timeout: 60000
    read_timeout: 60000
    write_timeout: 60000
    routes:
      - name: user-auth-public
        paths:
          - /api/v1/users/auth
        methods:
          - GET
          - POST
          - OPTIONS
        strip_path: true
        preserve_host: false
        plugins:
          - name: jwt
            enabled: false
      - name: user-service-protected
        paths:
          - /api/v1/users
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        strip_path: true
        preserve_host: false
        plugins:
          - name: jwt
            enabled: true
            config:
              key_claim_name: kid
              claims_to_verify:
                - exp
              secret_is_base64: false
              run_on_preflight: false

  - name: product-service
