apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: ai-ecommerce
  labels:
    app: inventory-service
    app.kubernetes.io/name: inventory-service
    app.kubernetes.io/part-of: ai-ecommerce-platform
    app.kubernetes.io/version: latest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
        app.kubernetes.io/name: inventory-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8005"
    spec:
      containers:
        - name: inventory-service
          image: ghcr.io/REPO/inventory-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8005
              protocol: TCP
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          livenessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: ai-ecommerce
  labels:
    app: inventory-service
    app.kubernetes.io/name: inventory-service
    app.kubernetes.io/part-of: ai-ecommerce-platform
spec:
  selector:
    app: inventory-service
  ports:
    - name: http
      port: 8005
      targetPort: 8005
      protocol: TCP
  type: ClusterIP
