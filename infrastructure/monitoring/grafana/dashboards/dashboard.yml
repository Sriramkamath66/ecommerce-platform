apiVersion: 1

providers:
  - name: "AI E-Commerce"
    orgId: 1
    folder: "AI E-Commerce"
    folderUid: "ai-ecommerce"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
