apiVersion: 1

deleteDatasources:
  - name: Prometheus
    orgId: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    orgId: 1
    url: http://prometheus:9090
    basicAuth: false
    isDefault: true
    version: 1
    editable: false
    jsonData:
      httpMethod: POST
      prometheusType: Prometheus
      prometheusVersion: 2.47.0
      timeInterval: "15s"
      queryTimeout: "60s"
      incrementalQuerying: true
      exemplarTraceIdDestinations:
        - name: traceID
          datasourceUid: jaeger
